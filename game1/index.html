<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>魔法罢工绯闻：社息社畜恋爱探侦</title>
    <link>
</head>
<body>
<div class="window" id="gameWindow">
    <div class="title-bar">
        <span class="title-bar-text">🔍 魔法罢工绯闻：社息社畜恋爱探侦</span>
        <div class="title-bar-controls">
            <button disabled>—</button>
            <button disabled>□</button>
            <button disabled>✕</button>
        </div>
    </div>
    <div class="jones-header">
        <span class="jones-text">𝓙𝓸𝓷𝓮𝓼</span>
    </div>
    <div class="mode-bar" id="modeBar">
        <button class="mode-btn" data-mode="story">📖 叙事模式 (无限制)</button>
        <button class="mode-btn" data-mode="challenge">⚡ 挑战模式 (100次)</button>
        <button class="reset-btn" id="resetGameBtn">🔄 重置游戏</button>
    </div>
    <div class="content">
        <div class="search-area">
            <div class="search-box">
                <div class="search-input-group">
                    <input type="text" id="searchKeyword" class="search-input" placeholder="输入关键词... 例如: 实习生, 摇滚歌手" autocomplete="off">
                    <button id="searchBtn" class="search-btn">🔍 搜索</button>
                </div>
                <div class="result-box" id="resultArea">
                    【匿名信】<br><br>
                    如果你想了解那两位的故事，试着利用这个网站搜索……也许你会发现什么。<br><br>
                </div>
                <div class="status-line" id="statusLine"></div>
            </div>
        </div>
        <div class="record-area">
            <div class="collapsible-section" id="progressSection">
                <div class="collapsible-header">
                    <span>📜 推理进度</span>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="collapsible-content" id="progressContent">
                    <div class="chain-progress" id="chainProgress"></div>
                </div>
            </div>
            <div class="collapsible-section" id="clueSection">
                <div class="collapsible-header">
                    <span>📝 已获得线索</span>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="collapsible-content" id="clueContent">
                    <div class="clue-list" id="clueList">暂无</div>
                </div>
            </div>
            <div class="record-section">
                <div class="record-title">📔 我的笔记</div>
                <textarea id="userNotes" rows="2" placeholder="记录你的推理..."></textarea>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>  
</body>
</html>
